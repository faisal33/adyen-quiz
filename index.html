<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Adyen · World Cup Ready Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
          href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Familjen+Grotesk:wght@500;600;700&display=swap"
          rel="stylesheet">
  <style>
    :root {
      --adyen-green: #00D16A;
      --adyen-green-dark: #00B057;
      --adyen-green-soft: rgba(0, 209, 106, 0.12);
      --bg: #001222;
      --bg-elev: #0A1B2C;
      --bg-card: #10263A;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.16);
      --text: #F5F6F7;
      --text-dim: #9BA8B5;
      --text-mute: #6C7A88;
      --danger: #FF5A5A;
      --gold: #F5C046;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', system-ui, sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
      -webkit-font-smoothing: antialiased
    }

    body {
      background:
              radial-gradient(1200px 600px at 80% -10%, rgba(0, 209, 106, 0.18), transparent 60%),
              radial-gradient(900px 500px at -10% 110%, rgba(0, 209, 106, 0.10), transparent 60%),
              var(--bg);
      position: relative;
    }

    /* Subtle pitch lines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
              linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    }

    .app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 36px;
      flex-shrink: 0;
      z-index: 5;
    }

    .logo {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding: 4px 6px;
      margin: -4px -6px;
      border-radius: 8px;
      transition: opacity .15s
    }

    .logo:active {
      opacity: 0.7
    }

    .logo-svg {
      height: 28px;
      width: auto;
      display: block
    }

    .topbar-meta {
      font-size: 13px;
      color: var(--text-mute);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase
    }

    .admin-link {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text-mute);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    .admin-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.04);
    }

    /* Screen container */
    .screens {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 48px 48px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(16px);
      transition: opacity .45s ease, transform .45s ease, visibility .45s;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0)
    }

    /* Single child with margin:auto centers when it fits, scrolls naturally when too tall */
    .screen>.welcome-wrap,
    .screen>.quiz-wrap,
    .screen>.result-wrap {
      margin: auto 0
    }

    /* WELCOME */
    .welcome-wrap {
      max-width: 780px;
      width: 100%;
      text-align: center
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--adyen-green-soft);
      color: var(--adyen-green);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(0, 209, 106, 0.25);
    }

    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--adyen-green);
      box-shadow: 0 0 10px var(--adyen-green)
    }

    h1.hero {
      font-family: 'Familjen Grotesk';
      font-weight: 700;
      font-size: clamp(40px, 6vw, 68px);
      line-height: 1.02;
      letter-spacing: -0.025em;
      margin: 24px 0 16px;
    }

    h1.hero .accent {
      color: var(--adyen-green);
      font-style: italic;
      font-weight: 600
    }

    .lede {
      font-size: 18px;
      line-height: 1.5;
      color: var(--text-dim);
      max-width: 560px;
      margin: 0 auto 36px
    }

    .form-card {
      background: linear-gradient(180deg, rgba(27, 30, 35, 0.9), rgba(21, 23, 27, 0.9));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
      text-align: left;
      backdrop-filter: blur(10px);
    }

    .field {
      margin-bottom: 18px
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      letter-spacing: 0.02em
    }

    .field input {
      width: 100%;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--bg);
      border: 1.5px solid var(--line);
      color: var(--text);
      font-family: inherit;
      font-size: 17px;
      font-weight: 500;
      transition: border-color .2s, background .2s;
      outline: none;
    }

    .field input::placeholder {
      color: var(--text-mute)
    }

    .field input:focus {
      border-color: var(--adyen-green);
      background: #000A14
    }

    .field input.err {
      border-color: var(--danger)
    }

    .field-err {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
      min-height: 14px
    }

    .btn {
      -webkit-appearance: none;
      appearance: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 17px;
      padding: 20px 28px;
      border-radius: 14px;
      transition: transform .15s ease, background .2s, box-shadow .2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn:active {
      transform: scale(0.98)
    }

    .btn-primary {
      background: var(--adyen-green);
      color: #000;
      box-shadow: 0 6px 24px rgba(0, 209, 106, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .btn-primary:hover {
      background: #1AE07C
    }

    .btn-ghost {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--line-strong);
    }

    .btn-ghost:hover {
      border-color: var(--text);
      background: rgba(255, 255, 255, 0.04)
    }

    .consent {
      font-size: 12px;
      color: var(--text-mute);
      margin-top: 14px;
      text-align: center;
      line-height: 1.5
    }

    /* QUIZ */
    .quiz-wrap {
      max-width: 760px;
      width: 100%
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--bg-elev);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line)
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--adyen-green), #34E07C);
      border-radius: 999px;
      transition: width .5s cubic-bezier(.2, .8, .2, 1)
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 600;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums
    }

    .q-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .q-title {
      font-family: 'Familjen Grotesk';
      font-weight: 600;
      font-size: clamp(26px, 3.4vw, 36px);
      line-height: 1.2;
      letter-spacing: -0.015em;
      margin: 0 0 12px;
    }

    .q-text {
      font-size: 18px;
      line-height: 1.5;
      color: var(--text-dim);
      margin: 0 0 32px;
      max-width: 640px
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px
    }

    .answer {
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      background: var(--bg-card);
      border: 1.5px solid var(--line);
      border-radius: 18px;
      padding: 32px 24px;
      color: var(--text);
      font-family: inherit;
      font-weight: 700;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all .2s ease;
      min-height: 120px;
    }

    .answer:hover {
      border-color: var(--text-dim);
      transform: translateY(-2px)
    }

    .answer:active {
      transform: scale(0.98)
    }

    .answer .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px
    }

    .answer.yes .icon {
      background: var(--adyen-green-soft);
      color: var(--adyen-green)
    }

    .answer.no .icon {
      background: rgba(255, 90, 90, 0.12);
      color: var(--danger)
    }

    .answer.yes:hover {
      border-color: var(--adyen-green);
      background: rgba(0, 209, 106, 0.05)
    }

    .answer.no:hover {
      border-color: var(--danger);
      background: rgba(255, 90, 90, 0.04)
    }

    /* IMPACT panel */
    .impact {
      background: linear-gradient(180deg, rgba(0, 209, 106, 0.06), rgba(0, 209, 106, 0.02));
      border: 1px solid rgba(0, 209, 106, 0.25);
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .35s ease, transform .35s ease;
    }

    .impact.show {
      opacity: 1;
      transform: translateY(0)
    }

    .impact-row {
      display: flex;
      gap: 14px;
      margin-bottom: 18px
    }

    .impact-row:last-child {
      margin-bottom: 0
    }

    .impact-label {
      flex-shrink: 0;
      width: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--adyen-green);
      padding-top: 3px;
    }

    .impact-row:nth-child(2) .impact-label {
      color: var(--gold)
    }

    .impact-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.55;
      color: var(--text)
    }

    .impact-text strong {
      color: var(--text);
      font-weight: 700;
      background: rgba(0, 209, 106, 0.18);
      padding: 1px 6px;
      border-radius: 4px
    }

    .answer-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .answer-status.yes {
      background: var(--adyen-green-soft);
      color: var(--adyen-green)
    }

    .answer-status.no {
      background: rgba(255, 90, 90, 0.12);
      color: var(--danger)
    }

    /* RESULT */
    .result-wrap {
      max-width: 780px;
      width: 100%;
      text-align: center
    }

    .trophy {
      width: 120px;
      height: 120px;
      border-radius: 30px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-elev));
      border: 1px solid var(--line-strong);
      position: relative;
    }

    .trophy.win {
      background: linear-gradient(135deg, rgba(0, 209, 106, 0.25), rgba(0, 209, 106, 0.08));
      border-color: var(--adyen-green);
      box-shadow: 0 0 60px rgba(0, 209, 106, 0.4)
    }

    .trophy.mid {
      background: linear-gradient(135deg, rgba(245, 192, 70, 0.20), rgba(245, 192, 70, 0.05));
      border-color: rgba(245, 192, 70, 0.4)
    }

    .trophy.low {
      background: linear-gradient(135deg, rgba(255, 90, 90, 0.15), rgba(255, 90, 90, 0.04));
      border-color: rgba(255, 90, 90, 0.3)
    }

    .score-label {
      font-size: 13px;
      color: var(--text-mute);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .score-num {
      font-family: 'Familjen Grotesk';
      font-weight: 700;
      font-size: clamp(56px, 8vw, 96px);
      line-height: 1;
      letter-spacing: -0.03em;
      margin: 0
    }

    .score-num .total {
      color: var(--text-mute);
      font-weight: 500
    }

    .result-title {
      font-family: 'Familjen Grotesk';
      font-weight: 700;
      font-size: clamp(32px, 4.5vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 18px 0 14px
    }

    .result-title.win {
      color: var(--adyen-green)
    }

    .result-title.mid {
      color: var(--gold)
    }

    .result-title.low {
      color: var(--danger)
    }

    .result-msg {
      font-size: 17px;
      line-height: 1.6;
      color: var(--text-dim);
      max-width: 560px;
      margin: 0 auto 20px
    }

    .result-cta {
      font-size: 15px;
      line-height: 1.6;
      color: var(--adyen-green);
      max-width: 560px;
      margin: 0 auto 32px;
      font-weight: 600;
      padding: 16px 20px;
      border: 1px solid rgba(0,209,106,0.25);
      border-radius: 12px;
      background: rgba(0,209,106,0.06);
    }

    .result-actions {
      display: flex;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto
    }

    /* Confetti */
    .confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden
    }

    .conf {
      position: absolute;
      width: 10px;
      height: 14px;
      top: -20px;
      animation: fall linear forwards
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0)
      }

      100% {
        transform: translateY(110vh) rotate(720deg)
      }
    }

    /* Admin */
    .admin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px
    }

    .admin-overlay.show {
      display: flex
    }

    .admin-panel {
      background: var(--bg-card);
      border: 1px solid var(--line-strong);
      border-radius: 20px;
      padding: 24px;
      max-width: 760px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .admin-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .admin-title {
      font-family: 'Familjen Grotesk';
      font-size: 22px;
      font-weight: 700;
      margin: 0
    }

    .admin-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px
    }

    .admin-close:hover {
      background: var(--bg-elev);
      color: var(--text)
    }

    .admin-list {
      flex: 1;
      overflow-y: auto;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px
    }

    .sub-row {
      padding: 14px 4px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1.4fr 2fr 1fr 0.8fr;
      gap: 12px;
      align-items: center;
      font-size: 14px
    }

    .sub-row:last-child {
      border-bottom: none
    }

    .sub-row .name {
      font-weight: 600
    }

    .sub-row .email {
      color: var(--text-dim);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .sub-row .score {
      font-weight: 700;
      font-variant-numeric: tabular-nums
    }

    .sub-row .time {
      color: var(--text-mute);
      font-size: 12px;
      text-align: right
    }

    .admin-actions {
      display: flex;
      gap: 10px
    }

    .admin-actions .btn {
      flex: 1;
      padding: 14px;
      font-size: 14px
    }

    .empty {
      text-align: center;
      color: var(--text-mute);
      padding: 40px 20px;
      font-size: 14px
    }

    /* Adjustments for landscape iPad */
    @media (min-width:1024px) {
      .screen {
        padding: 32px 64px 64px
      }
    }

    @media (max-width:520px) {
      .answers {
        grid-template-columns: 1fr
      }

      .topbar {
        padding: 16px 20px
      }

      .screen {
        padding: 16px 20px 32px
      }

      .form-card {
        padding: 24px
      }

      .impact-row {
        flex-direction: column;
        gap: 6px
      }

      .impact-label {
        width: auto
      }

      .sub-row {
        grid-template-columns: 1fr 1fr;
        font-size: 13px
      }

      .sub-row .time {
        display: none
      }
    }
  </style>
</head>

<body>
<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo" id="logo" title="Adyen" role="img" aria-label="Adyen">
      <svg class="logo-svg" viewBox="70 55 226 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#00D16A"
              d="M76 76.138h31.724a6.343 6.343 0 0 1 6.345 6.345v31.724H82.345A6.343 6.343 0 0 1 76 107.862V92h15.862v12.69h6.345V85.655H76zM253.655 76.138v38.069h15.862V85.655h6.345v28.552h15.862V82.483a6.343 6.343 0 0 0-6.345-6.345zM164.828 130.069h31.724a6.343 6.343 0 0 0 6.345-6.345V76.138h-15.863v28.552h-6.344V76.138h-15.862v31.724a6.343 6.343 0 0 0 6.344 6.345h15.862v6.345h-22.206zM247.31 114.207h-31.724a6.343 6.343 0 0 1-6.345-6.345V76.138h31.725a6.343 6.343 0 0 1 6.344 6.345v15.862h-15.862v-12.69h-6.345v19.035h22.207zM158.483 60.276v53.931h-31.724a6.343 6.343 0 0 1-6.345-6.345v-25.38a6.343 6.343 0 0 1 6.345-6.344h9.517v28.552h6.345V60.276z" />
      </svg>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="topbar-meta" id="topMeta">Adyen North</div>
      <button class="admin-link" id="adminBtn" type="button">Admin</button>
    </div>
  </div>

  <div class="screens">

    <!-- WELCOME -->
    <section class="screen active" id="screen-welcome">
      <div class="welcome-wrap">
        <span class="eyebrow"><span class="dot"></span> World Cup 2026 Readiness</span>
        <h1 class="hero">Are you ready for the <span class="accent">global soccer surge?</span></h1>
        <p class="lede">A 7-question diagnostic to see if your business is set up to turn stadium traffic into
          high-value revenue. Takes about a minute.</p>
        <div class="form-card">
          <div class="field">
            <label for="name">Your name</label>
            <input id="name" type="text" autocomplete="name" placeholder="Jane Doe" />
            <div class="field-err" id="err-name"></div>
          </div>
          <div class="field">
            <label for="email">Work email</label>
            <input id="email" type="email" autocomplete="email" placeholder="jane@company.com" />
            <div class="field-err" id="err-email"></div>
          </div>
          <button class="btn btn-primary" id="startBtn">Start the quiz →</button>
        </div>
      </div>
    </section>

    <!-- QUIZ -->
    <section class="screen" id="screen-quiz">
      <div class="quiz-wrap">
        <div class="progress">
          <div class="progress-track">
            <div class="progress-fill" id="progFill"></div>
          </div>
          <div class="progress-text" id="progText">1 / 5</div>
        </div>
        <div id="qContent"></div>
      </div>
    </section>

    <!-- RESULT -->

<script>
  /* ============================================================
     BACKEND ENDPOINT CONFIG
     ============================================================
     This frontend POSTs to a serverless function which holds the
     Airtable token securely. Deploy `api/submit.js` (Vercel) or
     `netlify/functions/submit.js` (Netlify) — see SETUP-GUIDE.md.

     `url`       — path to your function. Default '/api/submit'
                   works on both Vercel and Netlify (the netlify.toml
                   redirect is included). Use a full URL if you host
                   the HTML separately from the function.

     `kioskKey`  — optional shared secret. If you set the KIOSK_KEY
                   env var on the server, paste the same value here.
                   Adds a small barrier against random POSTs.
     ============================================================ */
  const ENDPOINT = {
    url: '/api/submit',
    kioskKey: ''
  };
  /* ============================================================ */

  /* ---------- DATA ---------- */
  const QUESTIONS = [
    {
      tag: "Question 1 of 7 · Payment Methods",
      title: "Capturing the highest spenders",
      text: "Can your biggest-spending international visitors pay using China UnionPay, JCB, Alipay or WeChat Pay at your checkout?",
      impact: "Asian super-spenders average <strong>$306.40 per transaction</strong>, nearly $188 more than European visitors. Many don't carry traditional cards at all, paying exclusively by QR wallet. International visitors overall spend <strong>70% more</strong> per purchase than locals.",
      why: "Adyen connects you to China UnionPay, Japan Credit Bureau, Alipay and WeChat Pay through a single integration — no extra hardware, no separate contracts. One change, and you're accessible to every fan walking through your door."
    },
    {
      tag: "Question 2 of 7 · Price Certainty",
      title: "Removing the mental math barrier",
      text: "Does your terminal show international fans the price in their own currency at the moment of purchase, or are you asking them to do the conversion in their head and hoping they don't walk away?",
      impact: "Uncertainty at the price stage kills the sale before it starts. Travelers hate converting currencies in their head, especially in a busy store or the back of a cab under time pressure.",
      why: "Adyen DCC shows customers their home currency price instantly at checkout across <strong>60+ currencies</strong> on your existing terminals — no extra contract or third-party provider required. It removes the hesitation that turns browsers into abandoned carts — and turns them into buyers instead."
    },
    {
      tag: "Question 3 of 7 · Booking Surge",
      title: "Winning the last-minute booking race",
      text: "When a surprise result triggers thousands of fans scrambling to rebook flights and hotels at the same moment, can your system absorb the spike — and let customers change plans without re-entering payment details?",
      impact: "A sudden result can collapse the booking window from weeks to minutes. Demand follows the bracket, not the calendar, and the merchant with the most friction loses the transaction every time.",
      why: "Adyen automatically recognises a shopper's preferred payment methods, whether CUP, JCB or a digital wallet, so customers don't have to re-enter card details under pressure. The merchant who offers the <strong>least resistance</strong> wins the transaction, every time."
    },
    {
      tag: "Question 4 of 7 · Downtime Economy",
      title: "Capturing the spontaneous spend",
      text: "Can a fan book your venue or pay for a meal on their phone in two taps, using Apple Pay, Google Pay or a saved card to avoid friction??",
      impact: "Most post-match purchases are spontaneous and mobile-led. Tourists spend <strong>$10 more per meal</strong> than locals, but only if the checkout doesn't lose them first. A slow or clunky mobile experience hands that spend straight to a competitor.",
      why: "Adyen's unified checkout enables Apple Pay, Google Pay and saved cards in a single integration, fans tap once and they're done. Same-day, high-intent transactions captured before they walk away."
    },
    {
      tag: "Question 5 of 7 · Authorization",
      title: "Hidden declines on valid cards",
      text: "When a high-value international card comes through your checkout, are you confident it gets approved without your system quietly declining valid transactions and costing you the sale??",
      impact: "International high-value transactions <strong>($1,000+)</strong> are routinely flagged as suspicious by rigid older systems. The customer gets declined, assumes something is wrong, and doesn't try again. The merchant never knows what they lost.",
      why: "Adyen's <strong>premium card routing and network tokenization</strong> are built to recognise high-value international cards and maximise approval rates — so a legitimate $2,000 transaction from a Japanese visitor doesn't get treated like fraud."
    },
    {
      tag: "Question 6 of 7 · Reliability",
      title: "Payments uptime when it matters most",
      text: "If your WiFi goes down during the tournament's busiest hour, do your terminals stay online, so that the revenue doesn't stop the moment the network does?",
      impact: "Network failures in high-traffic venues during peak hours are more common than most merchants expect. A dropped connection at halftime means <strong>zero revenue</strong> at exactly the worst possible moment.",
      why: "Adyen terminals with built-in Adyen-managed SIM cards — like the S1F2 and AMS1, <strong>automatically switch to 4G</strong> if your WiFi drops, with zero manual intervention needed. For deeper protection, Adyen's offline payment mode can be pre-configured to keep transactions processing even with no internet at all."
    },
    {
      tag: "Question 7 of 7 · Risk",
      title: "Losing sales to your own fraud filters",
      text: "Have you tuned your fraud settings for the influx of high-value international cards during the tournament so that your own risk rules don't block legitimate sales?",
      impact: "International transactions look different to rigid fraud systems, spending patterns that seem suspicious locally are completely normal for high-value overseas visitors. <strong>Merchants lose the sale without ever knowing why.</strong>",
      why: "Adyen's risk engine is trained on <strong>global data across thousands of merchants</strong> worldwide, so it recognises legitimate international spending patterns instead of flagging them as threats. A quick risk profile review before the tournament prevents losing sales to your own filters."
    }
  ];

  const RESULTS = {
    win: {
      title: "Match Winner!",
      emoji: "🏆",
      cls: "win",
      msg: "Your business is a powerhouse. You are ready to capture the super-spender segment and provide a world-class experience that builds loyalty far beyond the final whistle.",
      cta: ""
    },
    mid: {
      title: "In Training",
      emoji: "🏃",
      cls: "mid",
      msg: "You have the basics, but you are leaving money on the table. Focus on adding global payment methods and DCC to capture the 70% international premium spend.",
      cta: "Ready to turn this around? Find one of our team members with a green badge and they will walk you through exactly how to close these gaps and start capturing the international spend you are missing."
    },
    low: {
      title: "Stuck on the Bench",
      emoji: "🪑",
      cls: "low",
      msg: "You are at risk of significant friction and lost sales. High-value fans may find it too difficult to spend with you. Time to upgrade your payment stack.",
      cta: "Ready to turn this around? Find one of our team members with a green badge and they will walk you through exactly how to close these gaps and start capturing the international spend you are missing."
    }
  };

  /* ---------- STATE ---------- */
  let state = { name: "", email: "", idx: 0, answers: [], score: 0 };
  // In-memory cache is the primary store (always works). window.storage is a bonus.
  let submissionsCache = [];

  /* ---------- HELPERS ---------- */
  const $ = id => document.getElementById(id);
  const show = id => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
    $(id).scrollTop = 0;
  };
  const isEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

  /* ---------- WELCOME ---------- */
  $('startBtn').addEventListener('click', () => {
    const name = $('name').value.trim();
    const email = $('email').value.trim();
    let ok = true;
    $('err-name').textContent = '';
    $('err-email').textContent = '';
    $('name').classList.remove('err');
    $('email').classList.remove('err');
    if (name.length < 2) { $('err-name').textContent = 'Please enter your name.'; $('name').classList.add('err'); ok = false; }
    if (!isEmail(email)) { $('err-email').textContent = 'Please enter a valid email.'; $('email').classList.add('err'); ok = false; }
    if (!ok) return;
    state.name = name;
    state.email = email;
    state.idx = 0;
    state.answers = [];
    state.score = 0;
    renderQuestion();
    show('screen-quiz');
  });

  /* ---------- QUIZ ---------- */
  function renderQuestion() {
    const q = QUESTIONS[state.idx];
    const total = QUESTIONS.length;
    $('progFill').style.width = `${((state.idx) / total) * 100}%`;
    $('progText').textContent = `${state.idx + 1} / ${total}`;
    $('qContent').innerHTML = `
    <div class="q-tag">${q.tag}</div>
    <h2 class="q-title">${q.title}</h2>
    <p class="q-text">${q.text}</p>
    <div class="answers">
      <button class="answer yes" data-val="1">
        <span class="icon">✓</span> Yes
      </button>
      <button class="answer no" data-val="0">
        <span class="icon">✕</span> No
      </button>
    </div>
    <div id="impactSlot"></div>
  `;
    $('qContent').querySelectorAll('.answer').forEach(btn => {
      btn.addEventListener('click', () => onAnswer(parseInt(btn.dataset.val, 10)));
    });
  }

  function onAnswer(val) {
    state.answers.push(val);
    if (val === 1) state.score += 1;
    const q = QUESTIONS[state.idx];
    const isLast = state.idx === QUESTIONS.length - 1;
    // Disable buttons & highlight choice
    document.querySelectorAll('.answer').forEach(b => {
      b.disabled = true;
      b.style.opacity = parseInt(b.dataset.val, 10) === val ? '1' : '0.4';
      if (parseInt(b.dataset.val, 10) === val) {
        b.style.borderColor = val === 1 ? 'var(--adyen-green)' : 'var(--danger)';
        b.style.background = val === 1 ? 'rgba(0,209,106,0.08)' : 'rgba(255,90,90,0.05)';
      }
    });
    $('progFill').style.width = `${((state.idx + 1) / QUESTIONS.length) * 100}%`;

    $('impactSlot').innerHTML = `
    <div class="answer-status ${val === 1 ? 'yes' : 'no'}">
      ${val === 1 ? '✓ You answered Yes' : '✕ You answered No'}
    </div>
    <div class="impact" id="impactCard">
      <div class="impact-row">
        <div class="impact-label">Impact</div>
        <div class="impact-text">${q.impact}</div>
      </div>
      <div class="impact-row">
        <div class="impact-label">Why it matters</div>
        <div class="impact-text">${q.why}</div>
      </div>
    </div>
    <button class="btn btn-primary" id="nextBtn">${isLast ? 'See my result →' : 'Next question →'}</button>
  `;
    requestAnimationFrame(() => $('impactCard').classList.add('show'));
    $('nextBtn').addEventListener('click', () => {
      if (isLast) {
        finishQuiz();
      } else {
        state.idx += 1;
        renderQuestion();
      }
    });
    // Auto-scroll impact into view on small screens
    setTimeout(() => $('impactSlot').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  /* ---------- RESULT ---------- */
  async function finishQuiz() {
    const pct = state.score / QUESTIONS.length;
    const tier = pct >= 0.8 ? 'win' : pct >= 0.4 ? 'mid' : 'low';
    const r = RESULTS[tier];
    $('trophy').className = `trophy ${r.cls}`;
    $('trophy').textContent = r.emoji;
    $('scoreNum').textContent = state.score;
    $('resultTitle').className = `result-title ${r.cls}`;
    $('resultTitle').textContent = r.title;
    $('resultMsg').textContent = r.msg;
    $('resultCta').textContent = r.cta;
    $('resultCta').style.display = r.cta ? 'block' : 'none';

    show('screen-result');
    if (tier === 'win') confetti();

    const id = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const record = {
      id,
      name: state.name,
      email: state.email,
      score: state.score,
      tier: r.title,
      answers: state.answers,
      timestamp: new Date().toISOString(),
      synced: false
    };
    submissionsCache.push(record);
    queueAdd(record);          // localStorage backup (works on iPad, harmless in artifact preview)
    flushQueue();              // try to send this + any leftovers
  }

  /* ---------- AIRTABLE + RETRY QUEUE ---------- */
  const QUEUE_KEY = 'adyen_quiz_queue_v1';

  function queueRead() {
    try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); }
    catch (e) { return []; }
  }
  function queueWrite(arr) {
    try { localStorage.setItem(QUEUE_KEY, JSON.stringify(arr)); } catch (e) { }
  }
  function queueAdd(record) {
    const q = queueRead();
    if (!q.find(x => x.id === record.id)) q.push(record);
    queueWrite(q);
  }
  function queueRemove(id) {
    queueWrite(queueRead().filter(x => x.id !== id));
  }

  async function postToEndpoint(record) {
    if (!ENDPOINT.url) throw new Error('Endpoint not configured');
    const headers = { 'Content-Type': 'application/json' };
    if (ENDPOINT.kioskKey) headers['X-Kiosk-Key'] = ENDPOINT.kioskKey;
    const res = await fetch(ENDPOINT.url, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        name: record.name,
        email: record.email,
        score: record.score,
        tier: record.tier,
        timestamp: record.timestamp,
        answers: record.answers
      })
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(`Endpoint ${res.status}: ${txt.slice(0, 200)}`);
    }
    return res.json().catch(() => ({}));
  }

  let flushing = false;
  async function flushQueue() {
    if (flushing) return;
    if (!ENDPOINT.url) return;              // queue waits until configured
    if (!navigator.onLine) return;
    flushing = true;
    const q = queueRead();
    for (const rec of q) {
      try {
        await postToEndpoint(rec);
        queueRemove(rec.id);
        const cached = submissionsCache.find(c => c.id === rec.id);
        if (cached) cached.synced = true;
      } catch (e) {
        console.warn('Sync paused:', e.message);
        break;
      }
    }
    flushing = false;
  }

  // Retry on reconnect, on focus, and on a slow timer
  window.addEventListener('online', flushQueue);
  window.addEventListener('focus', flushQueue);
  setInterval(flushQueue, 30000);
  // On boot, restore any queued submissions into the in-memory cache + try sending
  (function bootRestore() {
    const q = queueRead();
    for (const rec of q) {
      if (!submissionsCache.find(c => c.id === rec.id)) submissionsCache.push(rec);
    }
    flushQueue();
  })();

  /* ---------- CONFETTI ---------- */
  function confetti() {
    const wrap = document.createElement('div');
    wrap.className = 'confetti';
    $('screen-result').appendChild(wrap);
    const colors = ['#00D16A', '#34E07C', '#F5C046', '#FFFFFF'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (2 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      c.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
      wrap.appendChild(c);
    }
    setTimeout(() => wrap.remove(), 5000);
  }

  /* ---------- RESTART ---------- */
  $('restartBtn').addEventListener('click', () => {
    state = { name: "", email: "", idx: 0, answers: [], score: 0 };
    $('name').value = ''; $('email').value = '';
    show('screen-welcome');
  });
  $('learnMoreBtn').addEventListener('click', () => {
    window.open(
            'https://www.adyen.com/knowledge-hub/turn-soccer-traffic-into-revenue',
            '_blank',
            'noopener,noreferrer'
    );
  });

  /* ---------- ADMIN (tap logo 5x) ---------- */
  let logoTaps = 0, logoTimer = null;
  $('logo').addEventListener('click', () => {
    logoTaps += 1;
    clearTimeout(logoTimer);
    logoTimer = setTimeout(() => logoTaps = 0, 1500);
    if (logoTaps >= 5) {
      logoTaps = 0;
      openAdmin();
    }
  });

  /* ---------- ADMIN ---------- */

  $('adminBtn').addEventListener('click', async () => {
    const passcode = prompt('Enter admin passcode:');
    if (!passcode) return;

    try {
      const res = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passcode })
      });

      if (!res.ok) {
        alert('Incorrect passcode.');
        return;
      }

      const data = await res.json();

      // Store temporary admin token in this browser session only
      sessionStorage.setItem('adminToken', data.token);

      openAdmin();
    } catch (e) {
      alert('Could not verify admin passcode.');
    }
  });



  async function openAdmin() {
    $('adminOverlay').classList.add('show');
    await loadSubs();
  }
  $('adminClose').addEventListener('click', () => $('adminOverlay').classList.remove('show'));

  async function loadSubs() {
    const list = $('adminList');
    list.innerHTML = '<div class="empty">Loading from Airtable…</div>';
    let rows = [];
    try {
      const adminToken = sessionStorage.getItem('adminToken');

      const headers = {};
      if (adminToken) headers['X-Admin-Token'] = adminToken;

      const res = await fetch('/api/list', { headers });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      rows = data.records || [];
    } catch (e) {
      list.innerHTML = `<div class="empty">Couldn't reach Airtable: ${escapeHtml(e.message)}</div>`;
      return;
    }
    // Merge local pending queue (not yet synced)
    const pending = queueRead();
    for (const rec of pending) {
      if (!rows.find(r => r.email === rec.email && r.timestamp === rec.timestamp)) {
        rows.push({ ...rec, _pending: true });
      }
    }
    if (rows.length === 0) {
      list.innerHTML = '<div class="empty">No submissions yet.</div>';
      $('subCount').textContent = '';
      list._rows = [];
      return;
    }
    rows.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    $('subCount').textContent = `(${rows.length}${pending.length ? ' · ' + pending.length + ' pending' : ''})`;
    list.innerHTML = rows.map(r => {
      const status = r._pending
              ? '<span style="color:var(--gold);font-size:11px;margin-left:6px">⏱ pending</span>'
              : '<span style="color:var(--adyen-green);font-size:11px;margin-left:6px">✓ synced</span>';
      return `
    <div class="sub-row">
      <div class="name">${escapeHtml(r.name)}</div>
      <div class="email">${escapeHtml(r.email)}</div>
      <div class="score">${r.score}/7${status}</div>
      <div class="time">${new Date(r.timestamp).toLocaleString()}</div>
    </div>`;
    }).join('');
    list._rows = rows;
  }




  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

  $('exportBtn').addEventListener('click', () => {
    const rows = $('adminList')._rows || [];
    if (rows.length === 0) { alert('No submissions to export.'); return; }
    const headers = ['timestamp', 'name', 'email', 'score', 'tier', 'q1', 'q2', 'q3', 'q4', 'q5', 'q6', 'q7'];
    const csv = [headers.join(',')].concat(
            rows.map(r => [
              r.timestamp, csvCell(r.name), csvCell(r.email), r.score, r.tier,
              ...((r.answers || []).concat([0, 0, 0, 0, 0, 0, 0]).slice(0, 7))
            ].join(','))
    ).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `adyen-quiz-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });
  function csvCell(v) { const s = String(v ?? ''); return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s; }

  $('clearBtn').addEventListener('click', async () => {
    if (!confirm('⚠️ Delete ALL records from Airtable?\n\nThis CANNOT be undone.')) return;
    if (!confirm('Are you absolutely sure? Type DELETE in the next prompt to confirm.')) return;

    const typed = prompt('Type DELETE to confirm:');
    if (typed !== 'DELETE') {
      alert('Cancelled.');
      return;
    }

    try {
      const adminToken = sessionStorage.getItem('adminToken');

      if (!adminToken) {
        alert('Admin session expired. Please close and reopen the admin panel.');
        return;
      }

      const headers = {
        'Content-Type': 'application/json',
        'X-Admin-Token': adminToken
      };

      const res = await fetch('/api/clear', {
        method: 'POST',
        headers
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();

      submissionsCache = [];
      try { localStorage.removeItem(QUEUE_KEY); } catch (e) {}

      alert(`Deleted ${data.deleted} records.`);
      await loadSubs();
    } catch (e) {
      alert('Failed to clear: ' + e.message);
    }
  });

  $('raffleBtn').addEventListener('click', async () => {
    const rows = ($('adminList')._rows || []).filter(r => !r._pending);
    if (rows.length === 0) { alert('No submissions to draw from.'); return; }
    $('adminOverlay').classList.remove('show');
    $('raffleOverlay').classList.add('show');
    $('raffleResult').style.display = 'none';
    $('raffleCycling').style.display = 'flex';
    const winner = rows[Math.floor(Math.random() * rows.length)];
    // Slot-machine cycle
    let elapsed = 0;
    const tick = () => {
      const r = rows[Math.floor(Math.random() * rows.length)];
      $('raffleName').textContent = r.name;
      elapsed += 80;
      if (elapsed < 2400) setTimeout(tick, 80 + elapsed / 30);
      else revealWinner(winner);
    };
    tick();
  });

  function revealWinner(w) {
    $('raffleCycling').style.display = 'none';
    $('raffleResult').style.display = 'block';
    $('winnerName').textContent = w.name;
    $('winnerEmail').textContent = w.email;
    // Reuse existing confetti
    const wrap = document.createElement('div');
    wrap.className = 'confetti';
    $('raffleOverlay').querySelector('.admin-panel').appendChild(wrap);
    const colors = ['#00D16A', '#34E07C', '#F5C046', '#FFFFFF'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (2 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
      wrap.appendChild(c);
    }
    setTimeout(() => wrap.remove(), 5000);
  }

  $('raffleAgainBtn').addEventListener('click', () => $('raffleBtn').click());
  $('raffleCloseBtn').addEventListener('click', () => {
    $('raffleOverlay').classList.remove('show');
    $('adminOverlay').classList.add('show');
  });

</script>
</body>

</html>
